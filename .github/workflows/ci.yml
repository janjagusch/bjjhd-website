name: CI

on:
  pull_request:
    branches: [main]
  # Also run on direct pushes to main so the default branch stays green.
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check with Astro
        run: npm run check

      - name: Build with Astro
        run: npm run build
